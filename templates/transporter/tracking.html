<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Delivery Tracking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="bg-light">

<div class="container py-5">

<h1>🚚 Delivery Tracking</h1>

<p class="text-muted">
Current delivery progress.
</p>

<div class="progress mb-4" style="height:30px;">

<div class="progress-bar progress-bar-striped progress-bar-animated bg-success"
style="width:70%;">

70%

</div>

</div>

<ul class="list-group">

<li class="list-group-item">✅ Order Picked Up</li>

<li class="list-group-item">✅ On the Way</li>

<li class="list-group-item">📍 Near Customer</li>

<li class="list-group-item">⏳ Awaiting Delivery</li>

</ul>

<div class="mt-4">

<a href="/transporter/confirmation"
class="btn btn-success">

Mark as Delivered

</a>

</div>

</div>

</body>

</html>
