<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Transporter Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">

<div class="container py-5">

<h1>🚚 Transporter Dashboard</h1>

<p class="text-muted">
Manage assigned deliveries.
</p>

<div class="row g-4">

<div class="col-md-3">
<div class="card shadow text-center">
<div class="card-body">
<h5>Assigned</h5>
<h2>18</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow text-center">
<div class="card-body">
<h5>Delivered</h5>
<h2>12</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow text-center">
<div class="card-body">
<h5>Pending</h5>
<h2>6</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow text-center">
<div class="card-body">
<h5>Rating</h5>
<h2>4.9⭐</h2>
</div>
</div>
</div>

</div>

<div class="mt-5">

<a href="/transporter/deliveries" class="btn btn-success">
View Deliveries
</a>

<a href="/transporter/profile" class="btn btn-outline-success">
Profile
</a>

<a href="/transporter/settings" class="btn btn-outline-secondary">
Settings
</a>

</div>

</div>

</body>
</html>
