<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Register | AgroSphere AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="bg-light">

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow-lg border-0 rounded-4">

<div class="card-body p-5">

<h2 class="text-center text-success fw-bold">
🌱 Create Your AgroSphere AI Account
</h2>

<p class="text-center text-muted mb-4">
Join the smart agricultural ecosystem.
</p>

<form>

<div class="row">

<div class="col-md-6 mb-3">
<label>Full Name</label>
<input type="text" class="form-control" placeholder="Enter full name">
</div>

<div class="col-md-6 mb-3">
<label>Email Address</label>
<input type="email" class="form-control" placeholder="Enter email">
</div>

<div class="col-md-6 mb-3">
<label>Phone Number</label>
<input type="text" class="form-control" placeholder="Enter phone number">
</div>

<div class="col-md-6 mb-3">
<label>Location</label>
<input type="text" class="form-control" placeholder="City / Region">
</div>

<div class="col-md-6 mb-3">
<label>Password</label>
<input type="password" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Confirm Password</label>
<input type="password" class="form-control">
</div>

<div class="col-12 mb-3">
<label>Select Role</label>

<select class="form-select">

<option selected>Select your role</option>

<option>Farmer</option>

<option>Buyer</option>

<option>Transporter</option>

</select>

</div>

<div class="col-12">

<button class="btn btn-success w-100">

Create Account

</button>

</div>

</div>

</form>

<div class="text-center mt-4">

Already have an account?

<a href="/login">

Login

</a>

</div>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
