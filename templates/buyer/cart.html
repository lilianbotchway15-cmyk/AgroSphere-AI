<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Shopping Cart | AgroSphere AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="bg-light">

<div class="container py-5">

<h1>🛒 Shopping Cart</h1>

<p class="text-muted">
Review your selected items before checkout.
</p>

<div class="card shadow">

<div class="card-body">

<table class="table align-middle">

<thead>

<tr>

<th>Product</th>

<th>Price</th>

<th>Quantity</th>

<th>Total</th>

<th>Action</th>

</tr>

</thead>

<tbody>

<tr>

<td>🍅 Tomatoes</td>

<td>GH₵15/kg</td>

<td>20 kg</td>

<td>GH₵300</td>

<td>

<button class="btn btn-outline-danger btn-sm">

Remove

</button>

</td>

</tr>

<tr>

<td>🌽 Maize</td>

<td>GH₵12/kg</td>

<td>10 kg</td>

<td>GH₵120</td>

<td>

<button class="btn btn-outline-danger btn-sm">

Remove

</button>

</td>

</tr>

</tbody>

</table>

<hr>

<div class="text-end">

<h4>Total: <span class="text-success">GH₵420</span></h4>

<a href="/buyer/checkout" class="btn btn-success btn-lg">

Proceed to Checkout

</a>

</div>

</div>

</div>

</div>

</body>

</html>
