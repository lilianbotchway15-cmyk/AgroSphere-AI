<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}AgroSphere AI{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">

<div class="container-fluid">

<a class="navbar-brand fw-bold" href="/">

🌱 AgroSphere AI

</a>

<div>

<a href="/farmer" class="btn btn-light btn-sm">

Dashboard

</a>

</div>

</div>

</nav>

<div class="container-fluid">

<div class="row">

<!-- Sidebar -->

<div class="col-md-2 bg-success text-white min-vh-100 p-3">

<h4 class="mb-4">

Farmer Panel

</h4>

<div class="list-group">

<a href="/farmer" class="list-group-item list-group-item-action">

🏠 Dashboard

</a>

<a href="/farmer/my_produce" class="list-group-item list-group-item-action">

🌾 My Produce

</a>

<a href="/farmer/orders" class="list-group-item list-group-item-action">

📦 Orders

</a>

<a href="/farmer/analytics" class="list-group-item list-group-item-action">

📊 Analytics

</a>

<a href="/farmer/ai" class="list-group-item list-group-item-action">

🤖 AI Assistant

</a>

<a href="/farmer/messages" class="list-group-item list-group-item-action">

💬 Messages

</a>

<a href="/farmer/profile" class="list-group-item list-group-item-action">

👤 Profile

</a>

<a href="/login" class="list-group-item list-group-item-action text-danger">

🚪 Logout

</a>

</div>

</div>

<!-- Page Content -->

<div class="col-md-10 p-4">

{% block content %}

{% endblock %}

</div>

</div>

</div>

</body>

</html>
