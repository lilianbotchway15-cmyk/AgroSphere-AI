<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analytics | AgroSphere AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-light">

<div class="container py-5">

<h1>📊 Farm Analytics</h1>

<p class="text-muted">
Track your farm's performance and sales.
</p>

<div class="row g-4 mb-5">

<div class="col-md-3">

<div class="card shadow-sm text-center">

<div class="card-body">

<h6>Total Revenue</h6>

<h2 class="text-success">GH₵18,500</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow-sm text-center">

<div class="card-body">

<h6>Orders Completed</h6>

<h2>86</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow-sm text-center">

<div class="card-body">

<h6>Products Sold</h6>

<h2>1,250kg</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow-sm text-center">

<div class="card-body">

<h6>Customer Rating</h6>

<h2>⭐ 4.8</h2>

</div>

</div>

</div>

</div>

<div class="card shadow mb-5">

<div class="card-body">

<h4>📈 Monthly Revenue</h4>

<canvas id="revenueChart"></canvas>

</div>

</div>

<div class="card shadow">

<div class="card-body">

<h4>🥇 Top Selling Products</h4>

<table class="table">

<thead>

<tr>

<th>Product</th>

<th>Units Sold</th>

<th>Revenue</th>

</tr>

</thead>

<tbody>

<tr>

<td>🍅 Tomatoes</td>

<td>520kg</td>

<td>GH₵7,800</td>

</tr>

<tr>

<td>🌽 Maize</td>

<td>410kg</td>

<td>GH₵4,920</td>

</tr>

<tr>

<td>🌶 Pepper</td>

<td>320kg</td>

<td>GH₵5,760</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script>

new Chart(document.getElementById('revenueChart'), {

type:'bar',

data:{

labels:['Jan','Feb','Mar','Apr','May','Jun'],

datasets:[{

label:'Revenue',

data:[2000,3200,2800,4200,3000,5500]

}]

}

});

</script>

</body>

</html>
