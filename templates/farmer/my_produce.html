<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>My Produce | AgroSphere AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="bg-light">

<div class="container py-5">

<div class="d-flex justify-content-between align-items-center mb-4">

<div>

<h1>🌾 My Produce</h1>

<p class="text-muted">
Manage all your farm products.
</p>

</div>

<button class="btn btn-success btn-lg">

<i class="bi bi-plus-circle"></i>

<a href="/farmer/add_produce"
class="btn btn-success">

<i class="bi bi-plus-circle"></i>

Add Produce

</a>

</button>

</div>

<div class="row mb-4">

<div class="col-md-8">

<input
type="text"
class="form-control"
placeholder="Search produce...">

</div>

<div class="col-md-4">

<select class="form-select">

<option>All Categories</option>

<option>Vegetables</option>

<option>Fruits</option>

<option>Cereals</option>

<option>Tubers</option>

</select>

</div>

</div>

<div class="row g-4">

    <div class="col-lg-4">

<div class="card shadow-sm border-0">

<img src="{{ url_for('static', filename='images/tomatoes.jpg') }}" class="card-img-top">

<div class="card-body">

<h4>🍅 Tomatoes</h4>

<p>250kg Available</p>

<h5 class="text-success">GH₵15/kg</h5>

<span class="badge bg-success">
Available
</span>

<hr>

<div class="d-flex justify-content-between">

<button class="btn btn-outline-success">

<a href="{{ url_for('edit_produce') }}" class="btn btn-warning btn-sm">
    Edit
</a>

</button>



<button
class="btn btn-outline-danger"

onclick="return confirm('Delete this produce?')">

Delete

</button>



</div>

</div>

</div>

</div>

<div class="col-lg-4">

<div class="card shadow-sm border-0">

<img src="{{ url_for('static', filename='images/corn.jpg') }}" class="card-img-top">

<div class="card-body">

<h4>🌽 Maize</h4>

<p>500kg Available</p>

<h5 class="text-success">GH₵12/kg</h5>

<span class="badge bg-warning text-dark">

Sold Out

</span>

<hr>

<div class="d-flex justify-content-between">

<button class="btn btn-outline-success">

<a href="{{ url_for('edit_produce') }}" class="btn btn-warning btn-sm">
    Edit
</a>

</button>



<button
class="btn btn-outline-danger"

onclick="return confirm('Delete this produce?')">

Delete

</button>


</div>

</div>

</div>

</div>


<div class="col-lg-4">

<div class="card shadow-sm border-0">

<img src="{{ url_for('static', filename='images/pepper.jpg') }}" class="card-img-top">

<div class="card-body">

<h4>🌶 Pepper</h4>

<p>100kg Available</p>

<h5 class="text-success">GH₵18/kg</h5>

<span class="badge bg-success">

Available

</span>

<hr>

<div class="d-flex justify-content-between">

<button class="btn btn-outline-success">

<a href="{{ url_for('edit_produce') }}" class="btn btn-warning btn-sm">
    Edit
</a>

</button>



<button
class="btn btn-outline-danger"

onclick="return confirm('Delete this produce?')">

Delete

</button>



</div>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
