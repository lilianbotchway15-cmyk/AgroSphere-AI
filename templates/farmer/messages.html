<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Messages | AgroSphere AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="bg-light">

<div class="container py-5">

<h1>💬 Messages</h1>

<p class="text-muted">
Stay connected with buyers, transporters and administrators.
</p>

<div class="row">

<div class="col-md-4">

<div class="list-group">

<a href="#" class="list-group-item list-group-item-action active">

👤 Kwame Mensah

</a>

<a href="#" class="list-group-item list-group-item-action">

🚚 Kojo Transport Ltd.

</a>

<a href="#" class="list-group-item list-group-item-action">

👩‍💼 Admin

</a>

</div>

</div>

<div class="col-md-8">

<div class="card shadow">

<div class="card-body" style="height:400px; overflow-y:auto;">

<div class="mb-3">

<strong>Kwame Mensah</strong>

<p>Hello, is the 200kg of tomatoes still available?</p>

</div>

<div class="mb-3 text-end">

<strong>You</strong>

<p>Yes, they're available and ready for delivery.</p>

</div>

<div class="mb-3">

<strong>Kwame Mensah</strong>

<p>Great! I'll confirm my order today.</p>

</div>

</div>

<div class="card-footer">

<div class="input-group">

<input type="text" class="form-control" placeholder="Type your message...">

<button class="btn btn-success">

<i class="bi bi-send-fill"></i>

Send

</button>

</div>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
