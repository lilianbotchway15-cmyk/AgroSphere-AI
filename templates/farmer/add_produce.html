<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Add Produce</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="bg-light">

<div class="container py-5">

<div class="d-flex justify-content-between align-items-center">

<h1>🌾 Add Produce</h1>

<a href="/farmer/my_produce" class="btn btn-outline-success">
← Back to My Produce
</a>

</div>

<hr>

<div class="card shadow">

<div class="card-body">

<form>

<div class="mb-3">

<label class="form-label">Produce Name</label>

<input type="text" class="form-control" placeholder="e.g Tomatoes">

</div>

<div class="mb-3">

<label class="form-label">Category</label>

<select class="form-select">

<option>Vegetables</option>

<option>Fruits</option>

<option>Grains</option>

<option>Tubers</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">Quantity (kg)</label>

<input type="number" class="form-control">

</div>

<div class="mb-3">

<label class="form-label">Price (GH₵ per kg)</label>

<input type="number" class="form-control">

</div>

<div class="mb-3">

<label class="form-label">Upload Image</label>

<input type="file" class="form-control">

</div>

<div class="mb-3">

<label class="form-label">Description</label>

<textarea class="form-control" rows="4"></textarea>

</div>

<button class="btn btn-success">

Add Produce

</button>

</form>

</div>

</div>

</div>

</body>

</html>
